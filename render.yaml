databases:
  - name: mana-db
    databaseName: mana_db
    user: mana_user
    plan: free

services:
  - type: web
    name: mana-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mana-db
          property: connectionString
      - key: DB_SSL
        value: "true"

  - type: web
    name: mana-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: mana-api
          property: host
      - key: NEXT_PUBLIC_USE_MOCKS
        value: "false"
